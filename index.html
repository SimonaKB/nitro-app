<style>
*{margin:0;padding:0;box-sizing:border-box}
html,body,#root{height:100%;width:100%;overflow:hidden}
body{font-family:'Inter',sans-serif;-webkit-tap-highlight-color:transparent;overscroll-behavior:none}
#splash{position:fixed;inset:0;background:#ffffff;display:flex;flex-direction:column;align-items:center;justify-content:center;z-index:9999;transition:opacity 0.6s ease-out}
/* Pink heart phase */
.sp-pink{opacity:0;position:absolute;animation:pinkIn 0.5s 0.2s ease-out forwards,pinkPulse 0.6s 0.7s ease-in-out 2,pinkOut 0.5s 1.9s ease-in forwards}
@keyframes pinkIn{from{opacity:0;transform:scale(0.3)}to{opacity:1;transform:scale(1)}}
@keyframes pinkPulse{0%,100%{transform:scale(1)}50%{transform:scale(1.12)}}
@keyframes pinkOut{from{opacity:1;transform:scale(1)}to{opacity:0;transform:scale(0.6)}}
/* Blue logo phase */
.sp-logo{opacity:0;animation:logoFade 0.6s 2.4s ease-out forwards}
@keyframes logoFade{from{opacity:0;transform:scale(0.7)}to{opacity:1;transform:scale(1)}}
/* Path draw */
.sp-draw{stroke-dasharray:500;stroke-dashoffset:500;animation:drawPath 1.0s 2.6s ease-out forwards}
.sp-draw2{stroke-dasharray:500;stroke-dashoffset:500;animation:drawPath 1.0s 2.8s ease-out forwards}
@keyframes drawPath{to{stroke-dashoffset:0}}
/* Person head */
.sp-head{opacity:0;animation:headPop 0.3s 3.4s ease-out forwards}
@keyframes headPop{from{opacity:0;transform:scale(0)}to{opacity:1;transform:scale(1)}}
/* Text */
.sp-txt{opacity:0;text-align:center;margin-top:12px;animation:txtUp 0.6s 3.6s ease-out forwards}
@keyframes txtUp{from{opacity:0;transform:translateY(16px)}to{opacity:1;transform:translateY(0)}}
</style>
</head>

<div id="splash">

<svg class="sp-pink" width="140" height="130" viewBox="0 0 100 90">
<path d="M50 85 C15 60 0 38 0 25 0 10 12 0 27 0 37 0 45 7 50 18 55 7 63 0 73 0 88 0 100 10 100 25 100 38 85 60 50 85Z" fill="url(#pg)"/>

</svg>
<!-- Phase 2: Blue Duše Lidem logo (heart outline + person) -->
<div class="sp-logo" style="display:flex;flex-direction:column;align-items:center">
<svg width="160" height="160" viewBox="0 0 200 200">
<defs><linearGradient id="bg" x1="0" y1="0" x2="1" y2="0.6"><stop offset="0%" stop-color="#4db8e8"/><stop offset="60%" stop-color="#1a6fb5"/><stop offset="100%" stop-color="#0a2855"/></linearGradient></defs>
<!-- Left half of heart -->
<path class="sp-draw" d="M100 178 C35 130 8 90 8 58 8 28 28 10 55 10 72 10 88 22 100 40" fill="none" stroke="url(#bg)" stroke-width="14" stroke-linecap="round" stroke-linejoin="round"/>

<path class="sp-draw2" d="M100 40 C112 22 128 10 148 10 168 10 192 28 192 58 192 90 165 130 100 178" fill="none" stroke="#0a2855" stroke-width="14" stroke-linecap="round" stroke-linejoin="round"/>
<!-- Person head -->
<circle class="sp-head" cx="148" cy="10" r="14" fill="#0a2855" style="transform-origin:148px 10px"/>
</svg>
<!-- Text below logo -->
<div class="sp-txt">
<div style="font-family:Inter,sans-serif;font-size:38px;font-weight:800;color:#0a2855;letter-spacing:2px;line-height:1.1">DUŠE</div>

const ICD10 = [{ code: "F0", name: "Organické duševní poruchy", color: "#ef4444", items: [{ code: "F00", name: "Demence u Alzheimerovy choroby", desc: "Progresivní neurodegenerativní onemocnění, které postupně narušuje paměť, orientaci, řeč i schopnost samostatného fungování. Postihuje zejména starší osoby a je nejčastější příčinou demence. Průběh je pomalý, ale nevratný — proto je důležité včasné zachycení a podpora.", symptoms: ["Ztráta krátkodobé paměti", "Dezorientace v čase a prostoru", "Potíže s řečí a pojmenováváním", "Změny osobnosti a nálady", "Ztráta iniciativy", "Bloudění"], tips: ["Kognitivní stimulace — křížovky, hry, vzpomínání", "Pravidelný denní režim — jistota a předvídatelnost", "Bezpečné prostředí — zamykání sporáku, označení místností", "Trpělivá, klidná komunikace — krátké věty, oční kontakt", "Zapojení do jednoduchých aktivit — skládání prádla, procházky"], help: ["alzheimer.cz", "Česká alzheimerovská společnost"] }, { code: "F05", name: "Delirium", desc: "Akutní stav zmatenosti s rychlým nástupem, který je VŽDY způsoben tělesnou příčinou (infekce, operace, léky, dehydratace). Člověk je dezorientovaný, může halucinovat, střídá se neklid s apatií. Delirium je akutní stav vyžadující okamžitou lékařskou pomoc — není to demence ani psychóza.", symptoms: ["Náhlá zmatenost a dezorientace", "Halucinace (často zrakové)", "Neklid střídaný apatií", "Poruchy spánku — bdění v noci", "Neschopnost soustředit se"], tips: ["VOLEJTE 155 — delirium vyžaduje lékařské vyšetření", "Nechte osobu v klidu, mluvte pomalu a jasně", "Zajistěte dostatek světla — pomáhá s orientací", "Nabídněte vodu — dehydratace je častou příčinou", "Neodporujte halucinacím — uklidňujte, nepřesvědčujte"], help: ["Tísňová linka 155", "Pohotovost nejbližší nemocnice"] }, { code: "F06", name: "Jiné organické psychické poruchy", desc: "Psychické poruchy přímo způsobené poškozením nebo onemocněním mozku — například po mrtvici, při epilepsii, nádoru mozku nebo zánětu. Mohou se projevovat halucinacemi, změnami nálady, úzkostí nebo poruchami myšlení. Klíčová je léčba základní příčiny.", symptoms: ["Halucinóza (halucinace při jasném vědomí)", "Organické poruchy nálady", "Organická úzkostná porucha", "Kognitivní změny", "Emoční nestabilita"], tips: ["Léčba základní nemoci je prioritou", "Pravidelné neurologické kontroly", "Psychoedukace — pochopení, co se děje, snižuje úzkost", "Strukturovaný den — mozek potřebuje předvídatelnost", "Relaxační techniky — hluboké dýchání, progresivní svalová relaxace"], help: ["Neurologie", "Psychiatrie"] }, { code: "F07", name: "Poruchy osobnosti po poškození mozku", desc: "Změny osobnosti a chování, které vznikají po úrazu hlavy, operaci mozku, nádoru nebo jiném poškození. Člověk se může stát impulzivní, apatický, emocionálně nestabilní — a často si tyto změny neuvědomuje. Pro blízké bývá velmi náročné, když se jim milovaná osoba změní.", symptoms: ["Výrazné změny osobnosti", "Impulzivita a nedostatek zábran", "Apatie a ztráta motivace", "Emoční labilita — výbuchy pláče nebo smíchu", "Neschopnost plánovat a organizovat"], tips: ["Neuropsychologická rehabilitace — trénink ztracených funkcí", "KBT přizpůsobená — práce s novými vzorci chování", "Jasná struktura dne — kalendář, seznamy, připomínky", "Podpora pro pečující — oni potřebují pomoc stejně jako nemocný", "Trpělivost — zotavování mozku trvá měsíce až roky"], help: ["Rehabilitace", "Neuropsychologie", "Linka pomoci: 116 123"] }] }, { code: "F1", name: "Poruchy vyvolané užíváním látek", color: "#f97316", items: [{ code: "F10", name: "Poruchy vyvolané alkoholem", desc: "Závislost na alkoholu je chronické onemocnění mozku, ne morální selhání. Alkohol je nejrozšířenější návykovou látkou v ČR — pije ho problémově přes 1,5 milionu lidí. Závislost se rozvíjí postupně: od společenského pití přes pravidelné, po nutnost pít, aby člověk normálně fungoval. Abstinenční příznaky mohou být život ohrožující.", symptoms: ["Ztráta kontroly nad pitím", "Zvyšující se tolerance (potřeba více)", "Abstinenční příznaky — třes, pocení, úzkost", "Pití navzdory negativním následkům", "Zanedbávání povinností a vztahů", "Ranní doušky k uklidnění"], tips: ["Detox VŽDY pod lékařským dohledem — abstinenční záchvaty mohou být smrtelné", "AA skupiny (Anonymní alkoholici) — síla sdíleného příběhu", "KBT — naučit se rozpoznat spouštěče a zvládat bažení", "Medikace — Antabus, Naltrexon, Akamprosat", "V krizi: zavolej 800 350 000 (Linka odvykání) nebo 116 123", "Jídlo a hydratace — alkohol devastuje výživu"], help: ["Linka odvykání: 800 350 000", "AT ordinace (ambulance pro léčbu závislostí)", "116 123"] }, { code: "F11", name: "Poruchy vyvolané opioidy", desc: "Opioidy (heroin, morfin, fentanyl, tramadol, kodein) vytvářejí extrémně silnou fyzickou závislost. Předávkování opioidy je jednou z nejčastějších příčin smrti na drogy. Substituční léčba (metadon, buprenorfin/Subutex) prokazatelně zachraňuje životy a umožňuje návrat do běžného života. Není to výměna jedné drogy za druhou — je to léčba.", symptoms: ["Kompulzivní potřeba užívat", "Těžký abstinenční syndrom — bolesti, průjmy, nespavost", "Rostoucí tolerance", "Zúžení zájmů na drogu", "Riziko předávkování — zástava dechu"], tips: ["Substituční léčba (metadon/buprenorfin) zachraňuje životy", "Naloxon — protijed při předávkování, měj ho po ruce", "Nikdy neužívej sám(a) — při předávkování ti někdo zachrání život", "Při předávkování: VOLEJTE 155, uložte do stabilizované polohy", "Snižování rizik: čisté jehly, testovací proužky na fentanyl", "Nesuď se — závislost je nemoc, ne volba"], help: ["DROP IN Praha", "substitucni-lecba.cz", "155 při předávkování", "Linka odvykání: 800 350 000"] }, { code: "F12", name: "Poruchy vyvolané kanabinoidy", desc: "Marihuana a hašiš mohou u některých lidí (zejména v dospívání nebo při genetické predispozici) vyvolat psychózu, úzkosti nebo amotivační syndrom. Psychická závislost je reálná — pocit, že bez toho nedokážeš relaxovat, spát nebo zvládat stres. Fyzická abstinence je mírnější než u jiných látek, ale odvykání bývá psychicky náročné.", symptoms: ["Psychická závislost — pocit, že bez toho to nejde", "Amotivační syndrom — ztráta zájmů a ambicí", "Paranoia a úzkost po užití", "Poruchy paměti a koncentrace", "U vulnerabilních osob: psychóza"], tips: ["Motivační rozhovory — proč chci přestat, co mi to bere?", "KBT — naučit se jiné způsoby relaxace a zvládání stresu", "Postupné snižování — není nutné přestat ze dne na den", "Najdi náhradu: sport, kreativita, meditace", "Vyhýbej se spouštěčům — situace, místa, lidé spojení s užíváním", "Spánek bez THC: melatonin, spánková hygiena, čaj"], help: ["Adiktologická ambulance", "Linka odvykání: 800 350 000"] }, { code: "F13", name: "Sedativa (benzodiazepiny)", desc: "Léky jako Xanax, Lexaurin, Rivotril, Diazepam jsou účinné na úzkost a nespavost, ale při dlouhodobém užívání vytvářejí silnou fyzickou závislost. NIKDY nevysazovat náhle — náhlé vysazení benzodiazepinů může způsobit epileptické záchvaty a v extrémních případech i smrt. Vysazování musí být pozvolné, pod dohledem lékaře, obvykle měsíce.", symptoms: ["Rostoucí tolerance — potřeba vyšší dávky", "Abstinenční příznaky — úzkost, třes, křeče, nespavost", "Pocit, že bez léku nemůžu fungovat", "Problémy s pamětí", "Ospalost, zpomalení"], tips: ["NIKDY nevysazuj náhle — vždy pomalý tapering pod lékařem", "Vysazování trvá týdny až měsíce — buď trpělivý(á)", "KBT na úzkost — naučit se zvládat úzkost bez léků", "Progresivní svalová relaxace jako náhrada", "Informuj lékaře o VŠECH lécích, které bereš", "V krizi: nedávej si víc, zavolej lékaři nebo na 116 123"], help: ["Psychiatrie", "Linka odvykání: 800 350 000", "116 123"] }, { code: "F15", name: "Stimulancia (pervitin, kokain)", desc: "Pervitin (metamfetamin) je nejrozšířenější nelegální drogou v ČR. Způsobuje silné euforie, ale devastující následky: psychózy, paranoia, rozpad zubů, kardiovaskulární problémy. Kokain má podobné účinky s kratším trváním. Abstinence není fyzicky nebezpečná, ale psychicky extrémně náročná — hluboká deprese, únava, bažení.", symptoms: ["Intoxikační psychóza — paranoia, halucinace", "Extrémní nespavost (dny bez spánku)", "Agrese a impulzivita", "Po odeznění: těžká deprese a vyčerpání", "Poškození zubů, kůže, srdce", "Silné bažení (craving)"], tips: ["V akutní psychóze: VOLEJTE 155 nebo odvezle na psychiatrii", "Detox v bezpečném prostředí — nemocnice nebo komunita", "KBT — práce se spouštěči a bažením", "Terapeutické komunity — dlouhodobá léčba funguje", "Spánek a strava jako první priorita po vysazení", "Podpora blízkých — informujte se, jak pomoci bez odsuzování"], help: ["SANANIM", "116 123", "Tísňová 155 při psychóze"] }, { code: "F17", name: "Tabák (nikotin)", desc: "Nikotinová závislost je jedna z nejsilnějších — a tabák zabíjí více lidí než všechny ostatní drogy dohromady. Každý pokus o odvykání zvyšuje šanci na trvalý úspěch. Průměrný kuřák potřebuje 7–10 pokusů, než se mu podaří přestat. To není selhání — to je proces.", symptoms: ["Silné bažení po cigaretě", "Podrážděnost a nervozita", "Neschopnost soustředit se", "Zvýšená chuť k jídlu", "Nespavost v prvních dnech"], tips: ["Kombinace: nikotinová náhrada + behaviorální podpora = nejúčinnější", "Vareniklin (Champix) — lék na předpis, výrazně pomáhá", "Identifikuj spouštěče: káva, stres, nuda, alkohol", "Nahraď rituál: žvýkačka, sirky v ruce, procházka", "Aplikace pro odvykání: Smokefree, QuitNow", "Každý den bez cigarety je vítězství — i kdyby jich bylo jen pár"], help: ["Linka odvykání: 800 350 000", "slfrp.cz — centra pro odvykání"] }, { code: "F19", name: "Polytoxikomanie", desc: "Současné užívání více návykových látek (např. pervitin + alkohol, opioidy + benzodiazepiny) výrazně zvyšuje riziko předávkování, protože se účinky nepředvídatelně násobí. Kombinace tlumivých látek (opioidy + alkohol + benzo) je zvláště smrtelně nebezpečná. Léčba musí být komplexní a individuální.", symptoms: ["Chaotické užívání více látek", "Nepředvídatelné reakce a interakce", "Vysoké riziko předávkování", "Rychlý fyzický i psychický rozklad", "Komplikovaná abstinence"], tips: ["Snižování rizik: nikdy nekombinuj tlumivé látky", "Detox pod lékařským dohledem — složité abstinenční příznaky", "Komplexní léčba v terapeutické komunitě", "Naloxon u sebe — zachraňuje život při předávkování opioidy", "Neužívej nikdy sám(a)", "V akutním stavu: VOLEJTE 155"], help: ["SANANIM", "Adiktologie", "155 při předávkování"] }] }, { code: "F2", name: "Schizofrenie a psychotické poruchy", color: "#a855f7", items: [{ code: "F20", name: "Schizofrenie", desc: "Schizofrenie je závažné onemocnění mozku postihující myšlení, vnímání a emoce. Člověk může slyšet hlasy, věřit nereálným věcem (bludy), mít potíže s motivací a sociálním fungováním. Ale důležitá zpráva: s moderní léčbou se většina lidí zotaví natolik, že může žít plnohodnotný život. Recovery je reálný cíl, ne výjimka.", symptoms: ["Sluchové halucinace — nejčastěji hlasy", "Bludy — přesvědčení neodpovídající realitě", "Dezorganizované myšlení a řeč", "Apatie a ztráta motivace (negativní příznaky)", "Sociální stažení", "Potíže s koncentrací a pamětí"], tips: ["Antipsychotika jsou základ léčby — NEVYSAZUJ bez lékaře", "KBTp — kognitivně-behaviorální terapie přizpůsobená psychóze", "Pravidelný denní režim — struktura je velmi důležitá", "Vyhýbej se stresu a nedostatku spánku — jsou hlavní spouštěče", "Alkohol a drogy výrazně zhoršují příznaky", "Peer podpora — Fokus, Clubhouse, svépomocné skupiny", "Rodina: edukace o nemoci pomáhá všem"], help: ["Psychiatrie", "Fokus ČR — fokus-cr.cz", "Clubhouse Praha", "116 123"] }, { code: "F22", name: "Poruchy s bludy", desc: "Přetrvávající bludné přesvědčení (např. že je člověk sledován, otrávený, nevěra partnera) bez dalších příznaků schizofrenie. Mimo oblast bludů je fungování a myšlení relativně zachováno. Léčba je náročná, protože člověk je o svých přesvědčeních pevně přesvědčen. Empatie a trpělivost okolí jsou klíčové.", symptoms: ["Systematizované bludy — logicky vybudovaný bludný systém", "Pronásledovací, žárlivecké nebo vztahovačné bludy", "Zachované fungování mimo oblast bludů", "Nedostatek náhledu na nemoc"], tips: ["Antipsychotika mohou pomoci — ale náhled je často omezený", "Nepotvrzujte bludy, ale ani se nehádejte — validujte pocity", "KBT — postupná práce s alternativními vysvětleními", "Budujte důvěru — tlak zhoršuje situaci", "Pokud je ohrožen kdokoliv (on sám nebo jiní): konzultujte lékaře"], help: ["Psychiatrie", "116 123"] }, { code: "F23", name: "Akutní psychotické poruchy", desc: "Náhlý vznik psychotických příznaků (bludy, halucinace, zmatenost), často v reakci na extrémní stres. Dobrá zpráva: prognóza je výrazně lepší než u schizofrenie — většina epizod odezní během dnů až týdnů s léčbou a mnozí lidé nemají recidivu.", symptoms: ["Náhlý vznik bludů a halucinací", "Extrémní zmatenost a dezorientace", "Rychlé střídání emocí", "Často souvisí s velkým stresem nebo traumatem"], tips: ["Akutní psychiatrická pomoc — hospitalizace je často nutná a pomáhá", "Bezpečné, klidné prostředí — snižte podněty", "Mluvte klidně, jednoduše, s respektem", "Krátkodobé podání antipsychotik — obvykle stačí", "Po odeznění: zpracování spouštěcí události v terapii"], help: ["155 — při akutním stavu", "Psychiatrická pohotovost"] }, { code: "F25", name: "Schizoafektivní poruchy", desc: "Kombinace příznaků schizofrenie (halucinace, bludy) s výraznými poruchami nálady (deprese nebo mánie). Průběh bývá epizodický. Léčba vyžaduje kombinovaný přístup — antipsychotika + stabilizátory nálady. S léčbou je možný velmi dobrý průběh.", symptoms: ["Psychotické příznaky (halucinace, bludy)", "Depresivní nebo manické epizody", "Kombinace obou typů příznaků současně", "Epizodický průběh s obdobími remise"], tips: ["Kombinovaná medikace — antipsychotika + stabilizátory nálady", "Sledování nálad — mood tracking pomáhá zachytit epizodu včas", "Spánková hygiena — nedostatek spánku spouští mánie i psychózu", "Psychoedukace — porozumění nemoci je půl léčby", "Nevysazuj léky, když se cítíš dobře — to je důkaz, že fungují"], help: ["Psychiatrie", "116 123"] }] }, { code: "F3", name: "Poruchy nálady", color: "#3b82f6", items: [{ code: "F31", name: "Bipolární porucha", desc: "Onemocnění charakterizované střídáním manických (nebo hypomanických) a depresivních epizod. V mánii má člověk přemíru energie, málo spí, utrácí, dělá riskantní rozhodnutí — a připadá si skvěle. V depresi propadá beznaději. Stabilizace medikací (lithium, valproát, lamotrigin) je naprosto klíčová — bez ní se epizody zhoršují.", symptoms: ["Manické epizody — euforie, snížená potřeba spánku, grandiosita", "Depresivní epizody — smutek, beznaděj, vyčerpání", "Impulzivní rozhodnutí v mánii — utrácení, riskantní chování", "Kolísání energie a produktivity", "Rychlé cykly — přechod během dnů"], tips: ["Medikace je základ — NIKDY nevysazuj sám(a)", "Sledování nálad denně — zachytíš epizodu dříve, než se rozvine", "Spánková hygiena je kritická — málo spánku spouští mánii", "Pravidelný režim — jídlo, spánek, aktivity ve stejný čas", "Alkohol a drogy dramaticky zhoršují průběh", "Mít krizový plán — kdo zavolá lékaři, když ty nebudeš chtít", "Blízcí: naučte se rozpoznat varovné signály mánie"], help: ["Psychiatrie", "Bipolár ČR — bipolarnisenemoc.cz", "116 123"] }, { code: "F32", name: "Depresivní epizoda", desc: "Smutek, ztráta zájmu o cokoliv (anhedonie), vyčerpání a pocit bezcennosti trvající minimálně 2 týdny. Deprese NENÍ lenost, slabost ani rozmar — je to onemocnění mozku, při kterém se mění hladiny neurotransmiterů. Je plně léčitelná. Většina lidí se s pomocí zotaví. Ale bez léčby se může vracet a prohlubovat.", symptoms: ["Přetrvávající smutek nebo prázdnota", "Ztráta zájmu a radosti (anhedonie)", "Únava a vyčerpání i po odpočinku", "Poruchy spánku — nespavost nebo nadměrné spaní", "Změny chuti k jídlu", "Pocity bezcennosti a viny", "Potíže s koncentrací a rozhodováním", "Myšlenky na smrt nebo sebevraždu"], tips: ["KBT (kognitivně-behaviorální terapie) — důkazy o účinnosti", "SSRI antidepresiva — začínají účinkovat za 2–4 týdny, VYDRŽ", "Pravidelný pohyb — i 20 minut chůze denně prokazatelně pomáhá", "Sociální kontakt — i když nechceš, zkus alespoň krátce", "Neizoluj se — řekni alespoň jednomu člověku, jak se cítíš", "Malé kroky: dnes stačí vstát, osprchovat se, sníst něco", "Spánková hygiena — pravidelný čas, bez obrazovek před spaním", "Alkohol deprese ZHORŠUJE, i když se zdá, že v tu chvíli pomáhá"], help: ["Psychiatrie", "116 123", "Psychoterapie"] }, { code: "F33", name: "Rekurentní depresivní porucha", desc: "Opakující se depresivní epizody s obdobími remise (zlepšení) mezi nimi. Čím více epizod proběhne, tím vyšší je riziko dalších. Proto je u rekurentní deprese důležitá dlouhodobá udržovací léčba — antidepresiva a psychoterapie jako prevence dalších epizod.", symptoms: ["Opakované depresivní epizody", "Období remise mezi epizodami", "Každá další epizoda se může spouštět snadněji", "Riziko chronifikace bez léčby"], tips: ["Dlouhodobá udržovací medikace — prevence relapsů", "Psychoterapie zaměřená na prevenci — MBCT (mindfulness-based)", "Naučit se rozpoznat varovné příznaky — zasáhni dřív, než se prohloubí", "Životní styl: spánek, pohyb, strava, sociální kontakty", "Krizový plán — co udělám, když to přijde znovu"], help: ["Psychiatrie", "Psychoterapie", "116 123"] }, { code: "F34", name: "Dystymie / Cyklotymie", desc: "Dystymie je chronická mírná deprese trvající minimálně 2 roky. Člověk se necítí tak hluboce depresivní, ale trvale smutný, unavený a bez radosti — až si myslí, že to je jeho osobnost. NENÍ. Je to léčitelná porucha. Cyklotymie je mírnější forma bipolární poruchy — kolísání nálady, které nesplňuje plná kritéria.", symptoms: ["Chronický smutek trvající roky", "Nízká energie a motivace", "Pocit, že takový jsem — ale není to pravda", "Kolísání nálady (u cyklotymie)", "Nízké sebevědomí"], tips: ["KBT — změna zažitých negativních myšlenkových vzorců", "Antidepresiva — i u dystymie fungují", "Toto NENÍ tvá osobnost — je to porucha a dá se léčit", "Aktivace chování — postupně zvyšuj aktivity, co ti dělaly radost", "Srovnání: vzpomeň si, jestli jsi vždy byl(a) takový(á)"], help: ["Psychoterapie", "Psychiatrie"] }] }, { code: "F4", name: "Neurotické a stresové poruchy", color: "#eab308", items: [{ code: "F40", name: "Fóbie", desc: "Intenzivní, iracionální strach z konkrétní situace nebo objektu, který vede k vyhýbání. Agorafobie (strach z otevřených prostor nebo situací, odkud nelze uniknout), sociální fobie (strach z hodnocení druhými) a specifické fobie (pavouci, výšky, jehly...). Fobie jsou jedny z nejlépe léčitelných psychických poruch — expoziční terapie má úspěšnost přes 80 %.", symptoms: ["Intenzivní strach nepřiměřený reálnému nebezpečí", "Vyhýbavé chování — zužování života", "Panická reakce při konfrontaci", "Anticipační úzkost — strach ze strachu", "Tělesné příznaky: bušení srdce, pocení, třes"], tips: ["Expoziční terapie — postupná konfrontace se strachem (zlatý standard)", "KBT — práce s katastrofickými myšlenkami", "Začni s nejmenším krokem — hierarchie strachu", "Dýchání 4-7-8: nádech 4s, zadrž 7s, výdech 8s", "Nevyhýbej se — každé vyhnutí strach posiluje", "SSRI mohou pomoci jako podpora k terapii"], help: ["KBT terapeut", "Psychiatrie"] }, { code: "F41", name: "Úzkostné poruchy (GAD, panika)", desc: "GAD (generalizovaná úzkostná porucha) je chronické nadměrné znepokojení o vše možné — zdraví, peníze, práci, blízké. Panická porucha jsou opakované panické ataky — náhlé záchvaty intenzivní úzkosti s tělesnými příznaky tak silnými, že si člověk myslí, že umírá nebo zešílí. Panická ataka je NEPŘÍJEMNÁ, ale NEOHROŽUJE tvůj život.", symptoms: ["GAD: chronické obavy, napětí, neschopnost relaxovat", "Panické ataky: bušení srdce, dušnost, závratě, strach ze smrti", "Pocit ztráty kontroly", "Vyhýbání se místům, kde ataka proběhla", "Svalové napětí, bolesti hlavy, GI potíže", "Nespavost a podrážděnost"], tips: ["Grounding 5-4-3-2-1: 5 věcí vidíš, 4 slyšíš, 3 cítíš dotykem, 2 čichem, 1 chutí", "Dýchání do břicha: pomalý nádech nosem 4s, výdech ústy 6s", "Panická ataka: řekni si PROJDE TO, sedni si, dýchej pomalu", "KBT — nejúčinnější psychoterapie pro úzkosti", "SSRI/SNRI — antidepresiva působí i na úzkost", "Omez kofein, alkohol a nikotin — zhoršují úzkost", "Pravidelný pohyb — snižuje hladinu kortizolu", "Progresivní svalová relaxace — napni a uvolni svaly od nohou nahoru"], help: ["Psychiatrie", "116 123", "KBT terapeut"] }, { code: "F42", name: "OCD (obsedantně-kompulzivní porucha)", desc: "Vtíravé, nežádoucí myšlenky (obsese) vyvolávají úzkost, kterou se člověk snaží zmírnit rituály (kompulze) — mytí rukou, kontrolování, počítání, přesvědčování sebe sama. Klíčové pochopení: myšlenky NEJSOU přání. To, že máš vtíravou myšlenku, neznamená, že to chceš udělat. OCD se velmi dobře léčí pomocí ERP terapie.", symptoms: ["Obsese — vtíravé myšlenky, obrazy nebo impulzy", "Kompulze — rituály pro zmírnění úzkosti (viditelné i mentální)", "Kontrolování — zamkl(a) jsem? Vypnul(a) jsem sporák?", "Kontaminační obavy — strach z nečistoty, nemocí", "Potřeba symetrie nebo přesnosti", "Vtíravé myšlenky o ublížení — NEJSOU přání"], tips: ["ERP (expozice s prevencí reakce) — zlatý standard léčby", "Myšlenka ≠ přání — vtíravá myšlenka o sobě nic neříká", "SSRI (často vyšší dávky než u deprese) — fluvoxamin, sertralin", "Neprováděj rituál — úzkost sama odezní, i když to tak nevypadá", "Nejsi blázen — OCD je neurologická porucha, ne tvá vina", "Nedej se vtáhnout do ujišťování — to je kompulze jako každá jiná"], help: ["KBT/ERP specialista", "Psychiatrie", "ocd-info.cz"] }, { code: "F43", name: "PTSD / C-PTSD", desc: "PTSD (posttraumatická stresová porucha) vzniká po jednorázovém traumatu — nehoda, napadení, katastrofa. C-PTSD (komplexní PTSD) vzniká po opakovaném nebo dlouhodobém traumatu — týrání v dětství, domácí násilí, šikana. K běžným příznakům PTSD přidává problémy s emocemi, identitou a vztahy. Trauma není to, co se ti stalo — je to to, co ti to udělalo uvnitř. A z toho se dá uzdravit.", symptoms: ["Flashbacky — znovuprožívání traumatu jako by se dělo teď", "Noční můry a poruchy spánku", "Hypervigilance — neustálé napětí a hlídání nebezpečí", "Vyhýbání se připomínkám traumatu", "Emoční dysregulace (C-PTSD) — intenzivní, rychle se měnící emoce", "Problémy s důvěrou a vztahy (C-PTSD)", "Negativní vnímání sebe — pocit, že jsem rozbitý(á)", "Disociace — odpojení od těla nebo reality"], tips: ["EMDR — pohyby očí pomáhají mozku zpracovat trauma", "Grounding při flashbacku: popis 5 věcí kolem, studená voda na ruce", "Somatické prožívání (SE) — práce s tělem, kde se trauma ukládá", "DBT u C-PTSD — zvládání emocí, mezilidské vztahy", "TIPP technika: Teplota (studená voda na obličej), Intenzivní cvičení, Pomalé dýchání, Párové svalové uvolnění", "Bezpečný prostor — představ si místo, kde se cítíš v bezpečí", "Trauma není tvá vina — a uzdravení je možné", "Fázová léčba: 1. stabilizace, 2. zpracování, 3. integrace"], help: ["Trauma terapeut (EMDR, SE)", "116 123", "Bílý kruh bezpečí — bkb.cz"] }, { code: "F44", name: "Disociativní poruchy", desc: "Disociace je odpojení od sebe, svého těla, emocí nebo vzpomínek. Je to obranný mechanismus mozku při přetížení — jako by mozek řekl: tohle je příliš, odpojím se. Zahrnuje depersonalizaci (pocit, že nejsem reálný), derealizaci (svět kolem je neskutečný), disociativní amnézii a DID (disociativní poruchu identity). Souvisí téměř vždy s traumatem.", symptoms: ["Depersonalizace — pocit, že nejsem ve svém těle", "Derealizace — svět kolem vypadá neskutečně, jako ve filmu", "Disociativní amnézie — ztráta vzpomínek na důležité události", "Změny identity (DID) — přepínání mezi odlišnými částmi osobnosti", "Pocit odpojení od emocí — emoční znecitlivění", "Ztráta času — nepamatuji si, co jsem dělal(a)"], tips: ["Grounding — drž předmět, popisuj jeho texturu, barvu, tvar", "Orientace v přítomnosti: Jsem [jméno], je [datum], jsem v bezpečí", "Studená voda na ruce nebo obličej — aktivuje smysly", "Silné smyslové podněty — mentol, citron, ostrá vůně", "Fázová léčba traumatu — stabilizace je první priorita", "Nebuď na sebe tvrdý(á) — disociace je ochrana, ne selhání"], help: ["Trauma specialista", "116 123"] }, { code: "F45", name: "Somatoformní poruchy", desc: "Skutečné fyzické příznaky (bolest, únava, dušnost, trávicí potíže), pro které lékaři nenacházejí organickou příčinu. To NEZNAMENÁ, že si to vymýšlíš — bolest je reálná. Mozek a tělo jsou propojeny a psychický stres se manifestuje fyzicky. Léčba spočívá v práci s oběma stránkami — tělem i psychikou.", symptoms: ["Chronické bolesti bez organické příčiny", "Trávicí potíže — nevolnost, průjmy, bolesti břicha", "Kardiovaskulární příznaky — bušení srdce, bolest na hrudi", "Únavový syndrom", "Nadměrné obavy o zdraví (hypochondrie)", "Časté návštěvy lékaře bez nálezu"], tips: ["KBT — propojení myšlenek, emocí a tělesných příznaků", "Mít jednoho lékaře, kterému důvěřuji — ne obcházení specialistů", "Zvládání stresu — progresivní relaxace, jóga, meditace", "Tělesné příznaky jsou reálné — nebagatelizuj je", "Pohyb — pomáhá regulovat stresovou odpověď", "Psychosomatická medicína — specializovaný obor pro toto"] }] }, { code: "F5", name: "Poruchy fyziologických funkcí", color: "#ec4899", items: [{ code: "F50", name: "Poruchy příjmu potravy", desc: "Anorexie, bulimie, záchvatovité přejídání (BED) a ARFID jsou vážným onemocněním s nejvyšší mortalitou ze všech psychických poruch. Nejsou o jídle — jsou o kontrole, emocích, sebehodnotě a často traumatu. Postihují všechny pohlaví a věkové skupiny. Čím dříve se zahájí léčba, tím lepší prognóza. Uzdravení je možné.", symptoms: ["Omezování příjmu potravy nebo hladovění", "Záchvatovité přejídání s/bez zvracení", "Intenzivní strach z přibírání", "Narušené vnímání vlastního těla — vidím se jinak, než jsem", "Kompenzační chování — zvracení, projímadla, nadměrné cvičení", "Rituály kolem jídla — krájení na malé kousky, skrývání jídla", "Vypadávání vlasů, lanugo, chlad, amenorea (u AN)"], tips: ["Multidisciplinární léčba — psychiatr + psycholog + nutriční terapeut", "KBT-E (enhanced) — specificky pro PPP", "FBT (Family-Based Treatment) — u adolescentů velmi účinný", "Jídlo je lék — pravidelné jídlo je součást léčby, ne nepřítel", "Tvé tělo si zaslouží výživu a péči — vždy", "Nekomentuj vzhled druhých — ani pozitivně", "V akutním stavu (BMI pod 15, srdeční arytmie): hospitalizace"], help: ["Anabell — anabell.cz — 541 235 235", "Centrum Anabell Ostrava", "116 123"] }, { code: "F51", name: "Poruchy spánku", desc: "Insomnie (neschopnost usnout nebo udržet spánek) psychogenního původu, noční děsy, náměsíčnost a další poruchy spánku, které nemají čistě fyzickou příčinu. Chronická nespavost má devastující dopad na psychiku — zhoršuje depresi, úzkost i psychózu. KBT-I (pro insomnie) je účinnější než léky a bez vedlejších účinků.", symptoms: ["Potíže s usínáním trvající týdny", "Časté probouzení během noci", "Noční děsy — křik, pláč ze spánku", "Náměsíčnost — chůze ve spánku", "Únava navzdory dostatku hodin v posteli"], tips: ["KBT-I — kognitivně-behaviorální terapie pro insomnie (zlatý standard)", "Spánková hygiena: tma, chlad (18°C), ticho, bez obrazovek 1h před spaním", "Pravidelný čas ulehnutí a vstávání — i o víkendu", "Postel = spánek — nic jiného (žádné telefony, jídlo, práce)", "Pokud neusneš do 20 min — vstaň, jdi jinam, vrať se až budeš ospalý", "Omez kofein po 14:00 a alkohol (narušuje kvalitu spánku)", "Relaxace před spaním: body scan, progresivní relaxace"], help: ["Spánková laboratoř", "KBT-I terapeut"] }, { code: "F53", name: "Poporodní deprese", desc: "Postihuje 10–15 % žen po porodu a je to VÁŽNÉ onemocnění, ne slabost. Liší se od baby blues (mírné smutky prvních dnů, které odezní). Poporodní deprese trvá týdny až měsíce a bez léčby se může prohloubit. V extrémních případech existuje i poporodní psychóza — ta vyžaduje okamžitou hospitalizaci.", symptoms: ["Přetrvávající smutek a pláč po porodu", "Pocity neschopnosti a viny vůči dítěti", "Intenzivní úzkost o dítě", "Potíže s vazbou na dítě", "Nespavost i když dítě spí", "Myšlenky na ublížení sobě nebo dítěti — řekni to lékaři hned"], tips: ["Odborná pomoc co nejdříve — poporodní deprese se sama nezlepší", "SSRI jsou bezpečné při kojení — sertralin, paroxetin", "Nemusíš zvládnout vše sama — požádej o pomoc, přijmi ji", "Spánek je priorita — střídej se s partnerem/blízkou osobou", "Při myšlenkách na ublížení: ZAVOLEJ ihned lékaři nebo 116 123", "Podpora partnera a rodiny je klíčová — edukace pomáhá všem"], help: ["usmevmamy.cz", "Gynekolog + psychiatr", "116 123"] }] }, { code: "F6", name: "Poruchy osobnosti", color: "#14b8a6", items: [{ code: "F60.3", name: "Emočně nestabilní / BPD", desc: "Hraniční porucha osobnosti je charakterizována intenzivními, rychle se měnícími emocemi, strachem z opuštění, nestabilními vztahy a impulzivitou. Často souvisí s traumatem v dětství. BPD NENÍ trvalý rozsudek — s terapií (zejména DBT) se většina lidí výrazně zlepší a mnoho z nich už po čase nesplňuje diagnostická kritéria.", symptoms: ["Intenzivní, rychle se měnící emoce", "Chronický strach z opuštění — reálného i imaginárního", "Nestabilní, bouřlivé vztahy — idealizace → devalvace", "Impulzivita — utrácení, riskantní sex, záchvatovité přejídání", "Sebepoškozování jako způsob regulace emocí", "Chronický pocit prázdnoty", "Intenzivní vztek, který je těžké kontrolovat", "Krátkodobé psychotické příznaky ve stresu"], tips: ["DBT (dialektická behaviorální terapie) — nejúčinnější léčba pro BPD", "TIPP dovednosti pro krizi: Teplota (studená voda na obličej 30s), Intenzivní pohyb (běh, dřepy), Pomalé dýchání (výdech delší než nádech), Párová svalová relaxace", "Mindfulness — pozorování emocí bez reagování na ně", "Bezpečnostní plán — co udělám místo sebepoškozování", "Validace — tvé emoce jsou skutečné a důležité, i když jsou intenzivní", "Mezilidská efektivita — jak prosit, říkat ne, zachovat sebeúctu", "Opačné jednání — když chceš utéct, zůstaň; když chceš křičet, mluv tiše"], help: ["DBT terapeut", "Fokus ČR — fokus-cr.cz", "116 123"] }, { code: "F60.0", name: "Paranoidní porucha osobnosti", desc: "Celoživotní vzorec hluboké nedůvěry a podezíravosti vůči druhým — přesvědčení, že ostatní mají špatné úmysly. Liší se od psychotické paranoi tím, že je zakořeněná v osobnosti, ne v bludech. Člověk je neustále ve střehu, interpretuje neutrální události jako útok. Vztahy jsou velmi obtížné. Léčba je náročná, ale možná.", symptoms: ["Celoživotní nedůvěra a podezíravost", "Interpretace neutrálních událostí jako nepřátelských", "Neschopnost odpustit domnělé urážky", "Pochybnosti o loajalitě přátel a partnera", "Neochota svěřit se druhým"], tips: ["Budování důvěry — pomalé, konzistentní, trpělivé", "KBT — zpochybňování automatických podezíravých myšlenek", "Terapeutický vztah je klíčový — terapeut musí být spolehlivý a transparentní", "Nepotvrzujte paranoidní interpretace, ale validujte pocity", "Jasná komunikace — nejasnosti živí podezíravost"], help: ["Psychoterapie", "Psychiatrie"] }, { code: "F60.6", name: "Vyhýbavá porucha osobnosti", desc: "Hluboké pocity nedostatečnosti, extrémní citlivost na odmítnutí a sociální inhibice. Na rozdíl od sociální fobie (kde je strach hlavně z konkrétních situací) je u vyhýbavé poruchy pocit méněcennosti celkový a prostupuje celý život. Člověk touží po blízkosti, ale vyhýbá se jí ze strachu z odmítnutí.", symptoms: ["Vyhýbání se sociálním situacím ze strachu z odmítnutí", "Hluboké pocity nedostatečnosti", "Extrémní citlivost na kritiku", "Neochota riskovat v mezilidských vztazích", "Přesvědčení, že jsem méně než ostatní"], tips: ["Schématerapie — práce s hlubokými přesvědčeními o sobě", "Postupná expozice — malé kroky v sociálních situacích", "Sociální dovednosti — trénink v bezpečném prostředí", "Skupinová terapie — bezpečný prostor pro trénování vztahů", "Sebelaskavost — mluv k sobě, jako bys mluvil(a) k příteli"], help: ["Psychoterapie", "Skupinová terapie"] }, { code: "F60.8", name: "Narcistická porucha osobnosti", desc: "Za grandiozitou a potřebou obdivu se ukrývá křehké sebevědomí závislé na vnějším potvrzení. Narcistická porucha osobnosti způsobuje utrpení jak nositeli (prázdnota, neschopnost hlubokých vztahů), tak jeho okolí. Léčba je možná, ale vyžaduje ochotu podívat se pod povrchovou fasádu.", symptoms: ["Grandiozita — přehnané vnímání vlastní důležitosti", "Potřeba konstantního obdivu", "Nedostatek empatie — neschopnost vcítit se", "Závist a přesvědčení, že ostatní závidí jemu", "Arogance a nadřazené chování", "Pod povrchem: křehkost, prázdnota, stud"], tips: ["Schématerapie — práce se zranitelným dítětem pod fasádou", "MBT (mentalizační terapie) — učení se rozumět emocím svým i druhých", "Terapie vyžaduje čas a ochotu — rychlé výsledky nečekejte", "Pro okolí: nastavte hranice, nedejte se manipulovat", "Narcismus je spektrum — mírné rysy má mnoho lidí"], help: ["Psychoterapie — schématerapie, MBT"] }, { code: "F60.5", name: "Anankastická / OCPD", desc: "Perfekcionismus, rigidní dodržování pravidel, potřeba kontroly a neschopnost delegovat. Liší se od OCD — u OCPD člověk své chování považuje za správné (ego-syntonní), u OCD ho vnímá jako nežádoucí. OCPD narušuje vztahy a pracovní život, protože člověk nutí své standardy i na ostatní.", symptoms: ["Extrémní perfekcionismus — práce nikdy není dost dobrá", "Rigidita — neschopnost přizpůsobit se změnám", "Potřeba kontroly — i nad ostatními", "Neschopnost delegovat — nikdo to neudělá tak dobře", "Workoholismus — práce na úkor vztahů a odpočinku", "Nadměrná pečlivost o detaily"], tips: ["KBT — práce s perfekcionismem a černobílým myšlením", "Experiment s flexibilitou — záměrně udělej něco nedokonale", "Učení se delegovat — krok po kroku, s tolerancí k odlišným způsobům", "Plánování volného času — ne jen práce", "Vztahová terapie — perfekcionismus devastuje blízké"], help: ["KBT terapeut", "Psychoterapie"] }] }, { code: "F7", name: "Mentální retardace", color: "#6366f1", items: [{ code: "F70", name: "Lehká mentální retardace (IQ 50–69)", desc: "S přiměřenou podporou může většina lidí s lehkou MR dosáhnout značné nezávislosti — bydlení, zaměstnání, vztahy. Klíčová je včasná speciální pedagogická podpora a trpělivost. Lidé s lehkou MR mají stejná práva a potřeby jako ostatní — potřebují jen trochu více času a srozumitelnou komunikaci.", symptoms: ["Pomalejší tempo učení", "Potíže s abstraktním myšlením", "Snížená schopnost plánování", "Dobrá praktická inteligence", "Sociální dovednosti — zvládnutelné s podporou"], tips: ["Speciální vzdělávání přizpůsobené tempu a potřebám", "Podporované zaměstnání — pracovní konzultant pomáhá", "Srozumitelná komunikace — jednoduché věty, vizuální podpory", "Trpělivost a respekt — ne infantilizace", "Podpora samostatnosti — učit praktické dovednosti"], help: ["SPC (Speciálně pedagogické centrum)", "Rytmus — chráněné dílny", "Společnost pro podporu lidí s MP"] }, { code: "F71-73", name: "Středně těžká až hluboká MR", desc: "Vyžaduje různou míru celoživotní podpory — od asistovaného bydlení po kompletní péči. I lidé s těžší MR mají emoce, preference a právo na důstojnost. Důležitá je stimulace, komunikace (i neverbální) a kvalitní péče.", symptoms: ["Výrazně omezená řeč (nebo neverbální komunikace)", "Potřeba asistence v sebeobsluze", "Závislost na péči druhých", "Schopnost prožívat radost, smutek, vztahy"], tips: ["Bazální stimulace — smyslové podněty pro kontakt se světem", "Alternativní komunikace — obrázky, gesta, technologie", "Důstojnost vždy — mluvte k člověku, ne o něm", "Pravidelný režim — předvídatelnost dává pocit bezpečí", "Podpora pro pečující — oni potřebují pomoc a odpočinek"], help: ["SPMP ČR", "Domovy pro osoby se zdravotním postižením"] }] }, { code: "F8", name: "Poruchy psychického vývoje", color: "#0ea5e9", items: [{ code: "F80", name: "Vývojové poruchy řeči", desc: "Opožděný nebo odchylný vývoj řeči a jazyka, který neodpovídá věku a intelektu dítěte. Může jít o potíže s výslovností, porozuměním řeči, tvorbou vět nebo koktavost. Včasná logopedická intervence dramaticky zlepšuje prognózu — čím dříve, tím lépe.", symptoms: ["Opožděný vývoj řeči — pozdní první slova", "Koktavost — opakování, prodlužování, blokády", "Potíže s výslovností více hlásek", "Agramatismy — chybné tvary slov a vět", "Omezená slovní zásoba"], tips: ["Logopedická péče co nejdříve — nepředpokládejte, že to přejde", "Denní cvičení 5–10 minut — pravidelnost je klíčová", "Čtěte dítěti — rozšiřuje slovní zásobu a porozumění", "Nenapravujte, ale modelujte — opakujte správně, nekritizujte", "U koktavosti: netlačte na plynulost, dejte čas"], help: ["Logopedická ambulance", "SPC"] }, { code: "F81", name: "Specifické poruchy učení", desc: "Dyslexie (čtení), dysgrafie (psaní), dyskalkulie (matematika), dysortografie (pravopis) — nejsou o nízké inteligenci. Jsou to neurologicky podmíněné odlišnosti ve zpracování informací. S kompenzačními pomůckami a přiměřenou podporou mohou děti (i dospělí) s poruchami učení dosáhnout čehokoliv.", symptoms: ["Dyslexie: potíže s plynulostí a porozuměním čteného textu", "Dysgrafie: nečitelný rukopis, pomalé psaní", "Dyskalkulie: potíže s čísly, počítáním, matematickými operacemi", "Dysortografie: časté pravopisné chyby navzdory znalosti pravidel", "Snížené sebevědomí kvůli školnímu neúspěchu"], tips: ["Reedukace — specifické cvičení zaměřené na danou poruchu", "Kompenzační pomůcky — čtečky, kalkulačky, PC, zvětšené texty", "Individuální vzdělávací plán ve škole", "Pochvala za snahu, ne jen za výsledek", "Dospělí: existují technologie, které kompenzují — audioknhy, diktování"], help: ["PPP (Pedagogicko-psychologická poradna)", "SPC"] }, { code: "F84", name: "Autistické spektrum (ASD)", desc: "Autismus je neurovývojová odlišnost, ne nemoc. Autistický mozek zpracovává informace jinak — může mít potíže se sociální komunikací a senzorickou regulací, ale také unikátní silné stránky: detailní myšlení, hluboké zájmy, upřímnost, systematičnost. Každý autistický člověk je jiný — proto spektrum.", symptoms: ["Odlišná sociální komunikace — potíže s čtením neverbálních signálů", "Senzorická přecitlivělost nebo hyposenzitivita — zvuky, světla, textury", "Potřeba rutiny a předvídatelnosti — změny jsou stresující", "Intenzivní, hluboké zájmy (special interests)", "Stimming — opakované pohyby pro seberegulaci (třepání, houpání)", "Sociální maskování — napodobování neuronormativního chování (vyčerpávající)"], tips: ["Respektuj senzorické potřeby — sluchátka, klidný prostor, přizpůsobení prostředí", "Strukturované prostředí — vizuální plány, příprava na změny", "Maskování je vyčerpávající — vytvoř prostor, kde nemusíš předstírat", "Stimming je regulace, ne problémové chování — neomezuj ho", "Naučit se rozpoznat přetížení (meltdown) vs. záměrné chování", "Sociální dovednosti se dají učit — ale nemusíš být jako ostatní", "Najdi komunitu — autističtí dospělí jsou cenný zdroj podpory"], help: ["APLA — apla.cz", "NAUTIS — nautis.cz", "Diagnostika: klinická psychologie"] }] }, { code: "F9", name: "Poruchy chování a emocí v dětství", color: "#22c55e", items: [{ code: "F90", name: "ADHD", desc: "ADHD není nedostatek pozornosti — je to odlišná regulace pozornosti. Mozek s ADHD funguje jinak: potřebuje více stimulace, hůře reguluje impulzy a má potíže s exekutivními funkcemi (plánování, organizace, zahájení úkolu). Ale také přináší kreativitu, energii, schopnost hyperfokusu a nestandardní myšlení. Diagnóza v dospělosti je validní — není to jen dětská porucha.", symptoms: ["Nepozornost — snadno se rozptýlím, zapomínám, ztrácím věci", "Hyperaktivita — neklid, potřeba pohybu, vnitřní motor", "Impulzivita — jednám dřív, než přemýšlím, skáču do řeči", "Hyperfokus — úplné pohlcení zajímavou činností (hodiny bez přestávky)", "Potíže s organizací a zahájením úkolů", "Emoční dysregulace — rychlé, intenzivní emoční reakce", "Prokrastinace — ne lenost, ale neschopnost mozku začít"], tips: ["Pomodoro technika: 25 min práce + 5 min pauza — mozek potřebuje členění", "Seznamy a vizuální plánovače — externalizuj, co je v hlavě", "Body doubling — pracuj vedle někoho, i virtuálně", "Pravidelný pohyb — dopamin, který ADHD mozek potřebuje", "Medikace (methylfenidát, atomoxetin) — není ostuda, je to kompenzační pomůcka", "Nastav prostředí: ztiš notifikace, jeden úkol, vyčisti stůl", "Timer na vše — ADHD zkresluje vnímání času", "Rutiny a automatizace — co nemusíš rozhodovat, ušetří energii"], help: ["Psychiatrie — ADHD diagnostika dospělých", "adhdas.cz", "Kolečko — podpůrná skupina"] }, { code: "F91", name: "Poruchy chování", desc: "Opakované agresivní, vzdorovité nebo antisociální chování u dětí a adolescentů, které porušuje společenské normy. Není to zlý charakter — za chováním je často trauma, ADHD, poruchy přílohy, rodinná dysfunkce nebo jiné nerozpoznané potřeby. Klíčový je přístup k příčině, ne jen trestu.", symptoms: ["Agresivita vůči lidem a zvířatům", "Ničení majetku", "Lhaní a krádeže", "Záškoláctví a útěky z domova", "Vzdorovité chování vůči autoritám", "Nízká empatie (ale ne vždy — může být i obranný mechanismus)"], tips: ["Rodičovský trénink — naučit se efektivně reagovat bez eskalace", "Pozitivní posílení — odměňuj žádoucí chování, neignoruj ho", "Hledej příčinu: trauma? ADHD? šikana? problémy v rodině?", "Konzistentní pravidla s jasnými důsledky — ale nikdy fyzické tresty", "Rodinná terapie — problém je často v systému, ne v dítěti"], help: ["Dětská psychiatrie", "SVP (Středisko výchovné péče)", "OSPOD"] }, { code: "F93", name: "Emoční poruchy v dětství", desc: "Separační úzkost (strach z odloučení od rodiče), školní fobie (strach ze školy) a další úzkostné poruchy specifické pro děti. Dítě není rozmazlené — prožívá skutečný, intenzivní strach. Důležité je nepodceňovat, neobviňovat a postupně pomoci se strachem pracovat.", symptoms: ["Separační úzkost — pláč, křik při odloučení od rodiče", "Školní fobie — odmítání chodit do školy, tělesné příznaky (bolest břicha)", "Nadměrné obavy a strach", "Tělesné projevy úzkosti — bolesti hlavy, břicha, nevolnost", "Poruchy spánku — noční můry, strach z usínání sám(a)"], tips: ["KBT přizpůsobená dětem — hravé techniky, příběhy", "Postupná expozice — malé kroky, ne nucení", "Validace pocitů — Vím, že se bojíš. Zvládneme to spolu.", "Prediktabilita — řekni dítěti přesně, co se bude dít", "Spolupráce škola + rodina + terapeut", "Neodcházejte potají — to zesiluje úzkost"], help: ["Dětský psycholog", "Dětská psychiatrie", "PPP"] }, { code: "F95", name: "Tikové poruchy (Tourette)", desc: "Tikový syndrom zahrnuje mimovolní opakované pohyby (motorické tiky) a/nebo zvuky (vokální tiky). Tourettův syndrom kombinuje obojí. Tiky se NEDAJÍ ovládnout vůlí — zadržení je dočasné a vede k většímu výbuchu. Coprolalie (vulgární slova) se vyskytuje jen u menšiny. Důležitá je edukace okolí a snížení stresu.", symptoms: ["Motorické tiky — mrkání, trhání hlavou, grimasy, pohyby rameny", "Vokální tiky — pokašlávání, posmrkávání, vydávání zvuků", "Kolísavý průběh — lepší a horší období", "Zhoršení stresem, únavou a vzrušením", "Předtikový pocit — nutkání, které se uvolní provedením tiku", "Často komorbidity: OCD, ADHD"], tips: ["CBIT (Comprehensive Behavioral Intervention for Tics) — první volba", "Edukace okolí — spolužáci, učitelé, kolegové: tiky jsou mimovolní", "Stres management — tiky se zhoršují stresem", "Neupozorňujte na tiky — zvyšuje to napětí", "Dostatek spánku a pohybu", "Medikace (clonidin, aripiprazol) — u závažných případů"], help: ["Neurologie", "Dětská psychiatrie", "Asociace Tourette ČR"] }] }];
